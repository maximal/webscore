services:

  app: &app-service-template
    build:
      context: .
      dockerfile: ./setup/docker/app/Dockerfile
    command: bash /var/www/setup/docker/app/run.sh
    volumes:
      - .:/var/www
      # Alpine PHP
      - ./setup/docker/app/php.ini:/etc/php85/conf.d/php-settings.ini
      # Alpine FrankenPHP
      - ./setup/docker/app/php.ini:/usr/local/etc/php/conf.d/php-settings.ini
      #- janus_bin:/usr/local/bin_copy
    working_dir: /var/www
    depends_on:
      - database
      #- rabbit
      #- janus
      #- storage
      #- storage2
    healthcheck:
      test: [ 'CMD', 'curl', 'http://localhost:8000/api/v1/health' ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  queue:
    <<: *app-service-template
    # Debug (listening)
    command: php /var/www/artisan queue:listen --timeout=0
    #command: bash -c "
    #  php /var/www/artisan rabbitmq:queue-declare default &&
    #  php /var/www/artisan queue:listen --timeout=0"
    # Production (working)
    #command: bash -c "
    #  php /var/www/artisan rabbitmq:queue-declare default &&
    #  php /var/www/artisan queue:work --timeout=0"
    healthcheck:
      test: [ 'NONE' ]

  scheduler:
    <<: *app-service-template
    command: php /var/www/artisan schedule:work
    healthcheck:
      test: [ 'NONE' ]

  ssr:
    <<: *app-service-template
    command: bash /var/www/setup/docker/app/ssr.sh
    healthcheck:
      test: [ 'CMD', 'curl', 'http://localhost:13715/health' ]
      interval: 30s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - '${APP_PORT:-80}:80'
    volumes:
      - .:/var/www
      # Octane
      - ./setup/docker/nginx/octane.conf:/etc/nginx/conf.d/default.conf
      # PHP-FPM
      #- ./setup/docker/nginx/php-fpm.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    healthcheck:
      test: [ 'CMD', 'curl', 'http://localhost/api/v1/health' ]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  database:
    image: postgres:alpine
    ports:
      - '${FORWARD_DB_PORT:-5432}:5432'
    #volumes:
    #  - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USERNAME:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_DATABASE:-database}
    healthcheck:
      test: [ 'CMD', 'pg_isready', '-q', '-d', '${DB_DATABASE:-database}', '-U', '${DB_USERNAME:-root}' ]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  database_testing:
    image: postgres:alpine
    ports:
      - '${FORWARD_DB_TEST_PORT:-6432}:5432'
    environment:
      POSTGRES_USER: ${DB_TESTING_USERNAME:-root}
      POSTGRES_PASSWORD: ${DB_TESTING_PASSWORD:-password}
      POSTGRES_DB: ${DB_TESTING_DATABASE:-database}
    healthcheck:
      test: [ 'CMD', 'pg_isready', '-q', '-d', '${DB_TESTING_DATABASE:-database}', '-U', '${DB_TESTING_USERNAME:-root}' ]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  db_data:
