map $http_upgrade $connection_upgrade {
	default upgrade;
	''      close;
}

server {
	root         /var/www/public;
	listen       80;
	listen       [::]:80;
	index        index.html index.php;

	error_log    /var/log/nginx/error.log;
	access_log   /var/log/nginx/access.log;

	charset utf-8;
	charset_types application/x-javascript text/css text/xml text/plain text/vnd.wap.wml application/javascript application/rss+xml;
	client_max_body_size 250m;

	# Статика
	location ~* \.(htm|html|txt|css|js|json|svg|jpg|jpeg|gif|png|bmp|ico|swf|wav|mp4|mov|ttf|eot|woff|woff2)$ {
		# Время жизни браузерного кеша
		#expires 180d;
		access_log off;
	}

	# Запрещаем доступ к файлам, начинающимся с .ht: .htaccess, .htpass и прочие
	# Нужно при одновременном запуске Nginx и Apache2
	location ~ /\.ht {
		deny all;
	}

	location /index.php {
		try_files /not_exists @octane;
	}

	location / {
		try_files $uri $uri/ @octane;
	}

	#location = /favicon.ico { access_log off; log_not_found off; }
	#location = /robots.txt  { access_log off; log_not_found off; }

	error_page 404 /index.php;

	resolver 127.0.0.11;

	location @octane {
		set $suffix "";

		if ($uri = /index.php) {
			set $suffix ?$query_string;
		}

		proxy_http_version 1.1;
		proxy_set_header Host $http_host;
		proxy_set_header Scheme $scheme;
		proxy_set_header SERVER_PORT $server_port;
		proxy_set_header REMOTE_ADDR $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;

		proxy_pass http://app:8000$suffix;
	}

	#location /ws/ {
	#	proxy_pass             http://websockets:8080/;
	#	proxy_http_version     1.1;
	#	proxy_set_header       Host $host;
	#	proxy_set_header       Scheme $scheme;
	#	proxy_set_header       SERVER_PORT $server_port;
	#	proxy_set_header       REMOTE_ADDR $remote_addr;
	#	proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
	#	proxy_set_header       Upgrade $http_upgrade;
	#	proxy_set_header       Connection 'Upgrade';
	#	proxy_cache_bypass     $http_upgrade;
	#	proxy_read_timeout     60;
	#	proxy_connect_timeout  60;
	#	proxy_redirect         off;
	#}
}
